# workflows/actualizador_mensual.yml

name: Actualizador Mensual de Datos IDEAM
on:
  schedule:
    # Se ejecuta de forma programada el día 2 de cada mes a las 05:00 AM UTC (12:00 AM hora Colombia)
    - cron: '0 5 2 * *'
  workflow_dispatch: # Te permite ejecutarlo manualmente desde el botón de GitHub cuando quieras

jobs:
  actualizar_sihcli:
    runs-on: ubuntu-latest
    steps:
    - name: Descargar Repositorio
      uses: actions/checkout@v3

    - name: Configurar Entorno Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Instalar Dependencias
      run: |
        pip install pandas requests

    - name: Ejecutar Pipeline de Descarga y Agregación
      run: |
        python actualizar_datos.py

    - name: Confirmar y Guardar Cambios en data/
      run: |
        git config --global user.name 'Chaac Bot Actualizador'
        git config --global user.email 'sihcli-bot@cuencaverde.org'
        git add data/lluvia_mensual_consolidado.csv
        git commit -m "Automatizado: Actualización mensual de datos de lluvia (Antioquia incluido)" || echo "Sin cambios detectados"
        git push
